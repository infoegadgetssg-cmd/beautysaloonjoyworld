<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | Joy World Beauty</title>
    
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
      :root {
        --primary-dark: #a86ba3;
        --primary-medium: #d6a7c0;
      }

      body {
        background: linear-gradient(135deg, var(--primary-dark), var(--primary-medium));
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .login-card {
        background: white;
        border-radius: 15px;
        padding: 40px;
        width: 100%;
        max-width: 400px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
      }

      .btn-primary {
        background: var(--primary-dark);
        border: none;
        padding: 12px;
      }

      .btn-primary:hover {
        background: var(--primary-medium);
      }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="text-center mb-4">
            <h3 class="text-primary">
                <i class="fas fa-spa"></i> Joy World Beauty
            </h3>
            <p class="text-muted">Admin Dashboard Login</p>
        </div>

        {% if messages %}
        <div class="messages-container mb-3">
            {% for message in messages %}
            <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
                {{ message }}
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
            {% endfor %}
        </div>
        {% endif %}

        <form method="post" action="{% url 'admin_dashboard:login' %}">
            {% csrf_token %}
            <div class="mb-3">
                <label class="form-label">Email Address</label>
                <input type="email" class="form-control" name="email" required placeholder="admin@example.com">
            </div>

            <div class="mb-4">
                <label class="form-label">Password</label>
                <input type="password" class="form-control" name="password" required placeholder="••••••••">
            </div>

            <button type="submit" class="btn btn-primary w-100">
                <i class="fas fa-sign-in-alt"></i> Sign In
            </button>
            
            <div class="text-center mt-3">
                <a href="{% url 'index' %}" class="text-decoration-none">
                    <i class="fas fa-arrow-left"></i> Back to Main Site
                </a>
            </div>
        </form>
    </div>

    <script>
        // Auto-hide alerts after 5 seconds
        setTimeout(function() {
            $('.alert').alert('close');
        }, 5000);
    </script>
</body>
</html>
