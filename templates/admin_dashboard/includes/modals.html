<!-- templates/admin_dashboard/includes/modals.html -->
<!-- Success Modal -->
<div class="modal fade" id="successModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header border-0">
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body text-center py-4">
                <div class="mb-4">
                    <i class="fas fa-check-circle fa-4x text-success"></i>
                </div>
                <h3 class="mb-3" id="successTitle">Success!</h3>
                <p class="mb-4 text-muted" id="successMessage">
                    Operation completed successfully.
                </p>
                <button type="button" class="btn btn-primary" data-bs-dismiss="modal">
                    Continue
                </button>
            </div>
        </div>
    </div>
</div>

<!-- Error Modal -->
<div class="modal fade" id="errorModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header border-0">
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body text-center py-4">
                <div class="mb-4">
                    <i class="fas fa-exclamation-circle fa-4x text-danger"></i>
                </div>
                <h3 class="mb-3" id="errorTitle">Error!</h3>
                <p class="mb-4 text-muted" id="errorMessage">
                    An error occurred.
                </p>
                <button type="button" class="btn btn-primary" data-bs-dismiss="modal">
                    OK
                </button>
            </div>
        </div>
    </div>
</div>
