<!-- user_dashboard/templates/user_dashboard/password_change_done.html -->
{% extends 'user_dashboard/base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8 col-lg-6">
        <div class="card shadow">
            <div class="card-header bg-success text-white">
                <h4 class="mb-0">
                    <i class="fas fa-check-circle me-2"></i>Password Changed Successfully
                </h4>
            </div>
            <div class="card-body text-center">
                <div class="mb-4">
                    <i class="fas fa-shield-alt fa-4x text-success mb-3"></i>
                    <h3>Password Updated!</h3>
                    <p class="text-muted">Your password has been changed successfully.</p>
                </div>
                <div class="mt-4">
                    <a href="{% url 'user_dashboard:dashboard' %}" class="btn btn-primary">
                        <i class="fas fa-home me-1"></i> Return to Dashboard
                    </a>
                    <a href="{% url 'user_dashboard:profile' %}" class="btn btn-outline-primary">
                        <i class="fas fa-user me-1"></i> Back to Profile
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
